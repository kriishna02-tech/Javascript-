<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Toggle</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: rgb(244, 247, 246); /* Default light background */
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Theme Switcher</h2>
        <p id="text">Click the button below to switch themes using JavaScript.</p>
        
        <button id="themeBtn">Dark Mode</button>
    </div>

    <script>
        const themeBtn = document.getElementById("themeBtn");
        const text = document.getElementById("text");

        themeBtn.addEventListener("click", function() {
            // Check if current background is dark
            if (document.body.style.backgroundColor === "rgb(18, 18, 18)") {
                // Change back to Light Mode using JS
                document.body.style.backgroundColor = "rgb(244, 247, 246)";
                document.body.style.color = "#1a1a1a";
                text.style.color = "#666666";
                
                themeBtn.style.backgroundColor = "#1a1a1a";
                themeBtn.style.color = "#ffffff";
                themeBtn.textContent = "Dark Mode";
            } else {
                // Change to Dark Mode using JS
                document.body.style.backgroundColor = "rgb(18, 18, 18)";
                document.body.style.color = "#f4f7f6";
                text.style.color = "#d1c8c8";
                
                themeBtn.style.backgroundColor = "#f4f7f6";
                themeBtn.style.color = "#121212";
                themeBtn.textContent = "Light Mode";
            }
        });
    </script>
</body>
</html>
